[phases.setup]
nixPkgs = ["python311Full", "playwright"]

[phases.install]
cmds = [
  "pip install --upgrade pip",
  "pip install -r requirements.txt",
  "playwright install-deps",
  "playwright install chromium",
  "chmod +x initialize_sip.sh"
]

[start]
cmd = "bash initialize_sip.sh --keys FROM_ENV --pulse RAILWAY_90S"

[variables]
SIP_PULSE_90S = "90"
SIP_SLEEP_4_5M = "270"
SIP_WEBSOCKET_URL = "wss://ws-auth.kraken.com/"
SIP_AUTONOMY_LEVEL = "1.0"
# RECOVERY_ID MUST be set in Railway Vault
